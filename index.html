<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fadil Developer</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
text-align:center;
}

header{
padding:120px 20px;
}

h1{
font-size:50px;
background:linear-gradient(90deg,#38bdf8,#a78bfa);
-webkit-background-clip:text;
color:transparent;
}

p{
color:#94a3b8;
font-size:18px;
}

button{
margin-top:20px;
padding:15px 35px;
border:none;
border-radius:30px;
background:#38bdf8;
color:black;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#a78bfa;
}

section{
padding:80px 20px;
}

.card{
background:#0f172a;
padding:30px;
margin:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

</style>
</head>

<body>

<header>

<h1>Fadil Irfandi</h1>

<p>Frontend Developer • Web3 Builder • Future Programmer</p>

<h2>TEST UPDATE FADIL</h2>

<button>View My Work</button>

</header>

<section>

<h2>My Skills</h2>

<div class="skills">

<div class="card" data-aos="fade-up">
<h3>HTML</h3>
<p>Building web structure</p>
</div>

<div class="card" data-aos="fade-up" data-aos-delay="200">
<h3>CSS</h3>
<p>Design & animation</p>
</div>

<div class="card" data-aos="fade-up" data-aos-delay="400">
<h3>JavaScript</h3>
<p>Interactive website</p>
</div>

</div>

</section>

<section>

<h2>Contact</h2>

<p>Email: dilongkoko@email.com</p>

</section>
<script>
AOS.init({
  duration: 1000,
  once: true
});
</script>

<script>
const cursor = document.createElement("div");
cursor.style.width="20px";
cursor.style.height="20px";
cursor.style.borderRadius="50%";
cursor.style.position="fixed";
cursor.style.background="#00ff9f";
cursor.style.pointerEvents="none";
cursor.style.mixBlendMode="difference";
cursor.style.zIndex="9999";
document.body.appendChild(cursor);

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});
</script>

</body>
</html>
